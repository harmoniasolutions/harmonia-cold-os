<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e86c1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e86c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#48c9b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#48c9b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1abc9c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Three overlapping circles: Voice, CRM, Scheduling -->
  <circle cx="185" cy="78" r="38" fill="none" stroke="url(#g1)" stroke-width="4" opacity="0.85"/>
  <circle cx="215" cy="78" r="38" fill="none" stroke="url(#g2)" stroke-width="4" opacity="0.85"/>
  <circle cx="200" cy="105" r="38" fill="none" stroke="url(#g3)" stroke-width="4" opacity="0.85"/>
  <!-- Center dot - the harmony point -->
  <circle cx="200" cy="87" r="5" fill="#1a5276" opacity="0.9"/>
  <!-- Text -->
  <text x="200" y="170" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#1a5276" text-anchor="middle" letter-spacing="6">HARMONIA</text>
</svg>