<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="gs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48c9b0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2e86c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5276;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Golden spiral approximation -->
  <g transform="translate(200, 85)">
    <path d="M0,-50 A50,50 0 0,1 50,0 A30,30 0 0,1 20,30 A18,18 0 0,1 2,12 A11,11 0 0,1 13,1 A7,7 0 0,1 6,-6 A4,4 0 0,1 2,-2"
